<!DOCTYPE html>
<html lang="en">
  <head>

		<meta charset="utf-8">
		<title>Great Procreations: Visualizing my Family Tree</title>

    <script src="https://d3js.org/d3.v3.min.js"></script>
    <link rel="stylesheet" href="https://jacobmgreer.github.io/Film-Tracker/js/bootstrap/css/bootstrap.min.css">

    <style type="text/css">
      .center {
        margin-left: auto;
        margin-right: auto;
        display: block;
        width: 960px;
        height: 960px;}
    </style>
  </head>

  <body onload="tree('gen','ascendency','color')">
    <main>
        <section class="container">
          <svg class="center"></svg>
        </section>
    </main>
    <script type="text/javascript">

    function tree(ring, order, color) {
      d3.selectAll("svg > *").remove();
      d3.select('#tooltip').style('display', 'none');
      d3.csv('pedigree-pie.csv',function(data) {
      	var data2 = data.filter(element => element[ring] !== "");
        var dataset2 = d3.nest()
          .key(function(d) { return d[ring]; })
          .entries(data2);
        //console.log(dataset2);

        var pie = d3.layout.pie().value(
          function(d) { return 1; }).sort(function(a, b){
    			  return a[order]-b[order]});
        var arc = d3.svg.arc();
        var ringcolor = "#01087C";

        var svg = d3.select("svg")
            .attr("width", 600)
            .attr("height", 600)
            .append("g")
            .attr("transform", "translate(450,300)");

        var gs = svg.selectAll("g").data(dataset2).enter().append("g");

        var path = gs.selectAll("path")
            .data(function(d) {
                return pie(d.values); })
          .enter().append("path")
            .attr("fill", function(d, i) {
                return d.data[color] ? d.data[color] : ringcolor;})
            .attr("d", function(d, i, j) {
                return arc.innerRadius(25*j).outerRadius(25*(j+1))(d); });
    	})
    }
    </script>

  </body>
</html>
