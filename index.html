<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=1024, user-scalable=no">
    <!-- Global site tag (gtag.js) - Google Analytics -->

		<script>
		  window.dataLayer = window.dataLayer || [];
		  function gtag(){dataLayer.push(arguments);}
		  gtag('js', new Date());
		  gtag('config', 'UA-32906329-1');

		<meta charset="utf-8">
		<title>Great Procreations: Visualizing my Family Tree</title>

    <script src="https://jacobmgreer.github.io/Great-Procreations/web/js/d3.v3.min.js"></script>
    <link rel="stylesheet" href="https://jacobmgreer.github.io/Film-Tracker/js/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style type="text/css">
      .center {
        margin-left: auto;
        margin-right: auto;
        display: block;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <h1 class="display-5">Great Procreations</h1>
    </nav>
    <nav class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <p class="lead">Exploring 30 generations of documented sexual activity that led to my grandparents.</p>
    </nav>
    <nav class="reset navbar navbar-light justify-content-center" style="background-color: #E9E9E9;">
      <h5 class="h5 lead" style="line-height:30px;vertical-align:middle;">Reset Graph</h5>
    </nav>

    <main>
      <section id="infobox" class="justify-content-center text-center" style="margin-top:25px;"></section>

      <section class="container" id="procreations">
        <svg class="center"></svg>
      </section>
    </main>
    <script type="text/javascript">

    if (window.location.hash) {
      var hash = window.location.hash.substring(1);
      ascendancy(id=parseInt(hash), load="load");
    } else {
      tree();}

    function ascendancy(id, load) {
      var doubles = Array.from({length: 35}, (_, i) => 2 ** i)
      var ge = doubles.indexOf(doubles.find(x => x >= (id + 1)));
      var gm = 2 ** (ge - 1);
      var gi = +id - gm;
      var radians = (Math.PI * 2) / gm;

      if (gi / 2 ** (ge - 1) < 1/4) {
        var side = "Paternal Grandfather";
      } else if (gi / 2 ** (ge - 1) < 2/4) {
        var side = "Paternal Grandmother";
      } else if (gi / 2 ** (ge - 1) < 3/4) {
        var side = "Maternal Grandfather";
      } else {
        var side = "Maternal Grandmother";}

      if (!load) {
        d3.selectAll("#infobox *").remove();
        return {
          ascendancy: +id,
          gen: ge,
          gen_index: gi,
          side: side,
          gen_max: gm,
          startA: radians * gi,
          endA: radians * (gi + 1)}
      } else {
        d3.selectAll("#infobox *").remove();
        tree(
          ge,
          radians * gi,
          radians * (gi + 1))}}

    function tree(stack, start, end) {
      d3.selectAll("svg > *").remove();
      var resetb =
        d3.select("nav.reset")
          .style("visibility", "hidden")
          .on("click", function(d) {tree()});

      d3.csv('data/pedigree.csv', function(data) {

       	var cleanData = data
          .map((d) => ({
           	ascendancy: +d.ascendancy,
           	fid: d.fid}))

        var fs = d3
          .range(1, 2 ** 14)
          .map(function(d) { return ascendancy(d) })
          .filter(d => d.gen > 2);

        if (typeof stack !== 'undefined') {
          resetb.style("visibility", "visible");
      		var fs = fs
      		  .filter(d => Number(d.gen) >= Number(stack))
      		  .filter(d => Number(d.gen) <= Number(stack) + 13)
      		  .filter(d => Number(d.startA) >= Number(start))
      		  .filter(d => Number(d.endA) <= Number(end));
        }

        fs.forEach(function(member) {
            var result = cleanData.filter(function(asfid) {
                return asfid.ascendancy === member.ascendancy;
            });
        	  member.fid = (result[0] !== undefined) ? result[0].fid : null;
        });

        var dataset2 = d3.nest()
          .key(function(d) { return d['gen']; })
          .entries(fs);

        if (typeof stack !== 'undefined') {
          infobox(fs[0]);}

        var pie = d3.layout.pie().value(
          function(e) { return 1; }).sort(
            function(a, b){
    			    return a['ascendency']-b['ascendency']});
        var arc = d3.svg.arc();

        var svg = d3.select("svg")
            .attr("width", 900)
            .attr("height", 900)
            .append("g")
            .attr("transform", "translate(450,450)");

        var gs = svg.selectAll("g")
            .data(dataset2)
            .enter()
            .append("g");

        var Tooltip = d3.select("section#procreations")
          .append("div")
          .style("position", "absolute")
          .style("z-index", "10")
          .style("visibility", "hidden")
          .style("background-color", "white")
          .style("padding", "5px");

        function query(fid, item) {
          d3.csv('data/people-core.csv', function(data) {
            details(data.filter(d => d.fid === fid), item) })}


        function infobox(data2) {
          var infobox = d3.select("#infobox")
            .append("p")
            .classed("lead", true)

          query(data2.fid, infobox)

          d3.select("#infobox").append("p").html("<a href='#" + data2.ascendancy +
          "' title='Permanent Ascendancy Link'><i class='bi bi-share'></i></a>")}

        function details(data, item) {
        	item
          	.data(data)
        		.html(function(d) {
            	var html = "<b>" + d.name + "</b></br>";
                  html += d.lifespan + "</br>";
                  if (d.birth_country != "NA") {
                  	html += "<i>Born in </i> " + d.birth_country + "</br>";}
                  html += "<i>Children</i> " + d.children;
                  if (d.siblings != 0) {
                  	html += ", <i>Siblings</i> " + d.siblings + "</br>";}
                  return html})}

        var mouseover = function(d) {
          if (d.data["fid"] != null) {
            Tooltip.style("visibility", "visible")}};
        var mousemove = function(d, i) {
          if (d.data["fid"] != null) {
            query(d.data["fid"], Tooltip);
            Tooltip
              .style("top", (d3.event.pageY-10) + "px")
              .style("left", (d3.event.pageX+10) + "px")
          }};
        var mouseleave = function(d) {
          Tooltip.style("visibility", "hidden")};

        var path = gs.selectAll("path")
            .data(function(d) {
                return pie(d.values);})
          .enter()
          .append("path")
            .attr("fill", function(d, i) {
              if (d.data["fid"] != null) {
                if (d.data["gen_index"] / 2 ** (d.data["gen"] - 1) < 1/4) {
                  return (d.data["ascendancy"] % 2 == 0) ? "#B24C6D" : "#FFC1D5";
                } else if (d.data["gen_index"] / 2 ** (d.data["gen"] - 1) < 2/4) {
                  return (d.data["ascendancy"] % 2 == 0) ? "#07B2D9" : "#88DFF2";
                } else if (d.data["gen_index"] / 2 ** (d.data["gen"] - 1) < 3/4) {
                  return (d.data["ascendancy"] % 2 == 0) ? "#738B4F" : "#A6D86F";
                } else {
                  return (d.data["ascendancy"] % 2 == 0) ? "#8950A1" : "#C881CF";
                }
              } else { return "#EEEEEE" }
            })
            .attr("d", function(d, i, j) {
                return arc
                  .innerRadius(30 * j)
                  .outerRadius(30 * (j + .8) )(d); })
            .on("click", function(d, i) {
              if (d.data["fid"] != null) {
                //console.log(d);
                tree(
                  stack = d.data["gen"],
                  start = d.data["startA"],
                  end = d.data["endA"]);}
              Tooltip.style("visibility", "hidden")
            })
            .on("mouseover", mouseover)
            .on("mousemove", mousemove)
            .on("mouseleave", mouseleave);
      })
    };
    </script>
  </body>
</html>
