<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=1024, user-scalable=no">
    <!-- Global site tag (gtag.js) - Google Analytics -->
		<script async src="https://www.googletagmanager.com/gtag/js?id=UA-32906329-1"></script>
		<script>
		  window.dataLayer = window.dataLayer || [];
		  function gtag(){dataLayer.push(arguments);}
		  gtag('js', new Date());
		  gtag('config', 'UA-32906329-1');
		</script>

		<meta charset="utf-8">
		<title>Great Procreations: Visualizing my Family Tree</title>

    <script src="web/js/d3.v3.min.js"></script>
    <link rel="stylesheet" href="https://jacobmgreer.github.io/Film-Tracker/js/bootstrap/css/bootstrap.min.css">

    <style type="text/css">
      .center {
        margin-left: auto;
        margin-right: auto;
        display: block;
      }
    </style>
  </head>

  <body onload="tree()">
    <nav class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <h1 class="display-5">Great Procreations</h1>
    </nav>
    <nav class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <p>Exploring My Family Tree</p>
    </nav>
    <nav class="reset navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
      <h3>Reset Graph</h3>
    </nav>
    <main>
        <section class="container" id="procreations">
          <svg class="center"></svg>
        </section>
    </main>
    <script type="text/javascript">

    function tree(stack, start, end) {
      d3.selectAll("svg > *").remove();
      var resetb =
        d3.select("nav.reset")
          .style("visibility", "hidden")
          .on("click", function(d) {tree()});

      d3.csv('pedigree-pie-extended.csv',function(data) {
        if (typeof stack !== 'undefined') {
          resetb.style("visibility", "visible");
      		var data = data
      		  .filter(element => Number(element.gen) >= Number(stack))
      		  .filter(element => Number(element.start) >= Number(start))
      		  .filter(element => Number(element.end) <= Number(end))
        } else {var data = data.filter(element => Number(element.gen) <= Number(11))};
        var dataset2 = d3.nest()
          .key(function(d) { return d['gen']; })
          .entries(data);

        var pie = d3.layout.pie().value(
          function(e) { return 1; }).sort(
            function(a, b){
    			    return a['ascendency']-b['ascendency']});
        var arc = d3.svg.arc();

        var svg = d3.select("svg")
            .attr("width", 900)
            .attr("height", 900)
            .append("g")
            .attr("transform", "translate(450,450)");

        var gs = svg.selectAll("g")
            .data(dataset2)
            .enter()
            .append("g");

        var Tooltip = d3.select("section#procreations")
          .append("div")
          .style("position", "absolute")
          .style("z-index", "10")
          .style("visibility", "hidden")
          .style("background-color", "white")
          .style("padding", "5px");
        var mouseover = function(d) {
          if (d.data["id"] != "NA") {
            Tooltip.style("visibility", "visible")}};
        var mousemove = function(d) {
          if (d.data["id"] != "NA") {
            Tooltip.html(
              "<b>Side:</b> " + d.data["quartile"] + "'s<br/>" +
              "<b>ID:</b> " + d.data["name"] + "<br/>" +
              d.data["lifespan"])
            .style("top", (d3.event.pageY-10)+"px")
            .style("left",(d3.event.pageX+10)+"px")}};
        var mouseleave = function(d) {
          Tooltip.style("visibility", "hidden")};

        var path = gs.selectAll("path")
            .data(function(d) {
                return pie(d.values); })
          .enter()
          .append("path")
            .attr("fill", function(d, i) {
                 return d.data["color"];})
            .attr("d", function(d, i, j) {
                return arc
                  .innerRadius(25 * j)
                  .outerRadius(25 * (j + .9) )(d); })
            .on("click", function(d) {
              if (d.data["id"] != "NA") {
                tree(
                  stack = d.data["gen"],
                  start = d.data["start"],
                  end = d.data["end"]);}
              Tooltip.style("visibility", "hidden")
            })
            .on("mouseover", mouseover)
            .on("mousemove", mousemove)
            .on("mouseleave", mouseleave);
      })
    };
    </script>
  </body>
</html>
