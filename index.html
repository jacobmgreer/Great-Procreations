<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=1024, user-scalable=no">

    <meta charset="utf-8">
    <title>Great Procreations: Exploring the Lineage</title>

    <script src="https://jacobmgreer.github.io/Great-Procreations/web/js/d3.v3.min.js"></script>
    <link rel="stylesheet" href="https://jacobmgreer.github.io/Film-Tracker/js/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style type="text/css">
      .center {
        margin-left: auto;
        margin-right: auto;
        display: block;
      }
      section#procreations p.iHide {
        visibility: hidden;
        display:none;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <h1 class="display-5">Great Procreations</h1>
    </nav>
    <nav id="subtitle" class="navbar navbar-light justify-content-center" style="background-color: #F2F2F2;">
        <p class="lead">Exploring 30 generations of documented sexual activity that led to my grandparents.</p>
    </nav>
    <nav class="reset navbar navbar-light justify-content-center" style="background-color: #E9E9E9;">
      <h5 class="h5 lead" style="line-height:30px;vertical-align:middle;">Reset Graph</h5>
    </nav>

    <main>
      <section id="infobox" class="justify-content-center text-center" style="margin-top:25px;"></section>

      <section class="container" id="procreations">
        <svg class="center"></svg>
      </section>
    </main>
    <script type="text/javascript">

    const range = (start, end) => {
        const length = end - start;
        return Array.from({ length }, (_, i) => start + i);
    }

    if (window.location.hash) {
      var hash = window.location.hash.substring(1)
      tree(ascendancy(parseInt(hash)))
      //infobox(ascendancy(parseInt(hash)))
    } else {
      tree(ascendancy(1))}

    var resetb =
      d3.select("nav.reset")
        .style("visibility", "hidden")
        .on("click", function(d) {
          d3.select("#infobox *").remove();
          d3.select("nav.reset").style("visibility", "hidden");
          history.pushState("", document.title, window.location.pathname);
          tree(ascendancy(1))});

    function getFID(asc, cut) {
      if (!cut) {
        var fileSlice = "data/core-pedigree.csv"
      } else {
        var fileSlice = "data/cuts/slice-" + String(cut).padStart(3, '0') + ".csv"
      }

      var mydata = [];
      d3.csv(fileSlice,
        function(data){
          mydata = data.filter(d => Number(d.ascendancy) === Number(asc));
        })
      console.log(mydata)
    }

    function infobox(asc, fid) {
      d3.select("#infobox *").remove()
      var infobox = d3.select("#infobox")
        .append("p")
        .classed("lead", true);
      details(asc, fid, infobox);}

    function details(asc, fid, object) {
      if (asc.ascendancy < 64) {
        var filePeople =  "data/core-people.csv"
      } else {
        var filePeople= "data/people/slice-" + String(asc.cut).padStart(3, '0') + ".csv"}
      d3.csv(filePeople, function(data) {
        object
          .data(data.filter(d => d.fid == fid))
          .html(function(d) {
            var html = "<p>" + asc.label + "<br/>";
                html += "<b>" + d.name + "</b><br/>";
                html += d.lifespan + "<br/>";
                if (d.birth_country != "NA") {
                  html += "<i>Born in </i> " + d.birth_country + "<br/>";}
                html += "<i>Children</i> " + d.children;
                if (d.siblings != 0) {
                  html += ", <i>Siblings</i> " + d.siblings;}
                html += "</p><p class=\"iHide\"><a href='https://www.familysearch.org/tree/person/details/" + d.fid +
      "' title='Go to Person on FamilySearch.org'><i class='bi bi-share'></i></a></p>";
                return html})})}

    var Tooltip =
      d3.select("section#procreations")
        .append("div")
        .style("position", "absolute")
        .style("z-index", "10")
        .style("visibility", "hidden")
        .style("background-color", "white")
        .style("padding", "10px");
    var mouseover = function(d) {
      if (d.data["fid"] != null) {
        Tooltip.style("visibility", "visible")}};
    var mouseleave = function(d) {
      Tooltip.select("div").remove()
      Tooltip.style("visibility", "hidden")};
    var mousemove = function(d, i) {
        if (d.data["fid"] != null) {
          details(ascendancy(d.data["ascendancy"]), d.data["fid"], Tooltip);
          Tooltip
            .style("top", (d3.event.pageY+10) + "px")
            .style("left", (d3.event.pageX+10) + "px")
        }};

    function ascendancy(id) {
      var doubles = Array.from({length: 35}, (_, i) => 2 ** i);
      var cuts = Array.from({length: 33}, (_, i) => i * 11.25);
      var stack = doubles.indexOf(doubles.find(x => x >= (+id + 1)));
      var stack_mx = 2 ** (stack - 1);
      var stack_i = +id - stack_mx;
      var radians = (Math.PI * 2) / stack_mx;
      var quarter = stack_i / 2 ** (stack - 1);
      var sA = 360 * stack_i / stack_mx - (360/stack_mx);

      if (quarter < 1/4) {
        var label = "Paternal Grandfather's Side";
        var hex_father = "#B24C6D";
        var hex_mother = "#FFC1D5";}
      else if (quarter < 2/4) {
        var label = "Paternal Grandmother's Side";
        var hex_father = "#07B2D9";
        var hex_mother = "#88DFF2";}
      else if (quarter < 3/4) {
        var label = "Maternal Grandfather's Side";
        var hex_father = "#738B4F";
        var hex_mother = "#A6D86F";}
      else if (quarter < 4/4) {
        var label = "Maternal Grandmother's Side";
        var hex_father = "#8950A1";
        var hex_mother = "#C881CF";}
      var color = (+id % 2) ? hex_mother : hex_father;

      return {
        ascendancy: +id,
        color: color,
        label: label,
        cut: cuts.indexOf(cuts.find(x => x > +sA)) + 31,
        gen: stack,
        gen_index: stack_i}}

    function tree(asc) {
      if (asc.ascendancy < 64) {
        var fileSlice = "data/core-pedigree.csv"
        var filePeople =  "data/core-people.csv"
      } else {
        var fileSlice = "data/cuts/slice-" + String(asc.cut).padStart(3, '0') + ".csv"
        var filePeople= "data/people/slice-" + String(asc.cut).padStart(3, '0') + ".csv"
      }

      d3.selectAll("svg > *").remove();

      d3.csv(fileSlice, function(data) {
        if (asc.ascendancy == 1) {
          var fs = d3
            .range(1, 2 ** 13)
            .map(d => ascendancy(d));
        } else {
          resetb.style("visibility", "visible");
          var rangeA = range(Number(asc.ascendancy), Number(asc.ascendancy) +
              Math.min(Math.max(13, 1), 29 - Number(asc.gen))).reduce((r,c,i) =>
              (r.push(i ? 2 * r[i-1] : c), r), [])
          var rangeB = range(Number(asc.ascendancy), Number(asc.ascendancy) +
              Math.min(Math.max(13, 1), 29 - Number(asc.gen))).reduce((r,c,i) =>
              (r.push(i ? 2 * r[i-1] + 1 : c), r), [])
          var ranges = rangeA.map((r, i) => range(rangeA[i], rangeB[i] + 1)).flat(1);
          var fs = ranges.map(i => ascendancy(i));
        }

        var cleanData = data
          .map((d) => ({
            ascendancy: +d.ascendancy,
            fid: d.fid}))

        fs.forEach(function(member) {
            var result = cleanData.filter(function(asfid) {
                return asfid.ascendancy === member.ascendancy;
            });
            member.fid = (result[0] !== undefined) ? result[0].fid : null;
        });

        var dataset2 = d3.nest()
          .key(d => d.gen)
          .entries(fs);

        var pie = d3.layout.pie().value(e => 1).sort(
            function(a, b){
              return a['ascendancy'] - b['ascendancy']});
        var arc = d3.svg.arc();

        var svg = d3.select("svg")
          .attr("width", 900)
          .attr("height", 900)
          .append("g")
          .attr("transform", "translate(450,450)");

        var gs = svg.selectAll("g")
          .data(dataset2)
          .enter()
          .append("g");

        var path = gs.selectAll("path")
          .data(function(d) {
            return pie(d.values);})
          .enter()
          .append("path")
          .attr("fill", function(d, i) {
            if (d.data["fid"]) { return d.data["color"]; }
            else {
              return (d.data["ascendancy"] % 2) ? "#EEEEEE" : "#D9D9D9"; }})

          .attr("d", function(d, i, j) {
            return arc
              .innerRadius(30 * j)
              .outerRadius(30 * (j + .8) )(d); })

          .on("click", function(d, i) {
            if (d.data["fid"] != null) {
              tree(ascendancy(d.data["ascendancy"]));
              infobox(ascendancy(d.data["ascendancy"]), d.data["fid"]);
              window.location.hash = d.data["ascendancy"];
              document.getElementById("subtitle").scrollIntoView();
            }
            Tooltip.style("visibility", "hidden");
          })
          .on("mouseover", mouseover)
          .on("mousemove", mousemove)
          .on("mouseleave", mouseleave);
      })
    };
    </script>
  </body>
</html>
